<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cosmic Pioneers</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Cosmic Pioneers</h1>
        <p>Meet six legendary women who broke barriers in space.</p>
    </header>

    <main>
        <div class="astronaut-grid">
            <div class="card">
                <div class="photo-frame">
                    <img src="images/tereshkova.jpg" alt="Valentina Tereshkova">
                </div>
                <h3>Valentina Tereshkova</h3>
            </div>
    
            <div class="card">
                <div class="photo-frame">
                    <img src="images/savitskaya.jpg" alt="Svetlana Savitskaya">
                </div>
                <h3>Svetlana Savitskaya</h3>
            </div>
    
            <div class="card">
                <div class="photo-frame">
                    <img src="images/ride.jpg" alt="Sally Ride">
                </div>
                <h3>Sally Ride</h3>
            </div>
    
            <div class="card">
                <div class="photo-frame">
                    <img src="images/jemison.jpg" alt="Mae Jemison">
                </div>
                <h3>Mae Jemison</h3>
            </div>
    
            <div class="card">
                <div class="photo-frame">
                    <img src="images/whitson.jpg" alt="Peggy Whitson">
                </div>
                <h3>Peggy Whitson</h3>
            </div>
    
            <div class="card">
                <div class="photo-frame">
                    <img src="images/koch.jpg" alt="Christina Koch">
                </div>
                <h3>Christina Koch</h3>
            </div>
        </div>
    </main>
    
    <footer>
        <p>Made for Stardance - Hack Club</p>
    </footer>
</body>

</html>
